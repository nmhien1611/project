<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-404 { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 40px 20px; }
        .page-404 .error-code { font-size: 96px; font-weight: bold; color: #ee4d2d; line-height: 1; margin-bottom: 8px; }
        .page-404 h2 { font-size: 24px; color: #333; margin-bottom: 12px; }
        .page-404 p { color: #888; font-size: 15px; margin-bottom: 28px; }
        .page-404 .btn-home { display: inline-block; padding: 12px 32px; background: #ee4d2d; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px; }
        .page-404 .btn-home:hover { background: #d43f22; }
        .page-404 .shopping-bag { font-size: 64px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit">MNghi</a></div>
        </div>
    </header>
    <main>
        <div class="page-404">
            <div class="shopping-bag">🛍️</div>
            <div class="error-code">404</div>
            <h2>Trang không tìm thấy!</h2>
            <p>Xin lỗi, trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.</p>
            <a href="index.html" class="btn-home">Về trang chủ</a>
        </div>
    </main>
    <footer><p>&copy; 2026 MNghi. Tất cả quyền được bảo lưu.</p></footer>
</body>
</html>
