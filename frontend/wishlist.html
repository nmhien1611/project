<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu thích - MNghi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wishlist-container { max-width: 1000px; margin: 30px auto; padding: 0 16px; }
        .wishlist-container h2 { margin-bottom: 20px; }
        .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .wishlist-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); position: relative; }
        .wishlist-card img { width: 100%; height: 180px; object-fit: cover; }
        .wishlist-card-body { padding: 12px; }
        .wishlist-card-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
        .wishlist-card-price { color: #ee4d2d; font-weight: bold; font-size: 15px; }
        .wishlist-card-old { color: #999; text-decoration: line-through; font-size: 12px; }
        .wishlist-remove { position: absolute; top: 8px; right: 8px; background: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; }
        .wishlist-add-cart { width: 100%; margin-top: 8px; padding: 8px; background: #ee4d2d; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .wishlist-add-cart:hover { background: #d43f22; }
        .empty-wishlist { text-align: center; padding: 60px 20px; color: #888; }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit">MNghi</a></div>
            <div class="user-actions" id="user-actions"></div>
        </div>
        <nav><ul>
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="profile.html">Hồ sơ</a></li>
            <li><a href="orders.html">Đơn hàng</a></li>
            <li><a href="cart.html">Giỏ hàng</a></li>
        </ul></nav>
    </header>

    <main>
        <div class="wishlist-container">
            <h2>❤️ Sản phẩm yêu thích</h2>
            <div id="wishlist-grid" class="wishlist-grid"></div>
        </div>
    </main>

    <footer><p>&copy; 2026 MNghi. Tất cả quyền được bảo lưu.</p></footer>

    <script src="js/auth.js"></script>
    <script>
        const API_URL = 'http://localhost:3001/api';

        function parsePrice(p) {
            if (typeof p === 'number') return p;
            return parseInt(String(p).replace(/[^\d]/g, '')) || 0;
        }

        async function renderWishlist() {
            const container = document.getElementById('wishlist-grid');
            const token = localStorage.getItem('authToken');

            if (!token) {
                container.innerHTML = `<div class="empty-wishlist" style="grid-column:1/-1">
                    <p>Bạn cần <a href="login.html" style="color:#ee4d2d;font-weight:bold">đăng nhập</a> để xem sản phẩm yêu thích.</p>
                </div>`;
                return;
            }

            container.innerHTML = '<p style="text-align:center;padding:40px;color:#888;grid-column:1/-1">Đang tải...</p>';

            try {
                const res  = await fetch(`${API_URL}/users/wishlist`, { headers: { Authorization: 'Bearer ' + token } });
                const list = await res.json();
                if (!res.ok) throw new Error(list.error || 'Lỗi server');

                if (!list.length) {
                    container.innerHTML = `<div class="empty-wishlist" style="grid-column:1/-1">
                        <p style="font-size:48px">❤️</p>
                        <p>Bạn chưa có sản phẩm yêu thích nào</p>
                        <a href="index.html" style="color:#ee4d2d;font-weight:bold;">Khám phá ngay →</a>
                    </div>`;
                    return;
                }

                container.innerHTML = list.map(p => {
                    const price    = p.price_number ? parsePrice(p.price_number) : parsePrice(p.price);
                    const oldPrice = p.old_price ? parsePrice(p.old_price) : null;
                    const salePrice = p.discount ? Math.floor(price * (1 - p.discount / 100)) : price;
                    const productJson = JSON.stringify(p).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
                    return `
                    <div class="wishlist-card">
                        <img src="${p.image || ''}" alt="${p.name}" onerror="this.style.display='none'">
                        <button class="wishlist-remove" onclick="removeWishlist(${p.id})" title="Xoá khỏi yêu thích">✕</button>
                        <div class="wishlist-card-body">
                            <div class="wishlist-card-name">${p.name}</div>
                            <div class="wishlist-card-price">${salePrice.toLocaleString('vi-VN')}₫</div>
                            ${oldPrice ? `<div class="wishlist-card-old">${oldPrice.toLocaleString('vi-VN')}₫</div>` : ''}
                            <button class="wishlist-add-cart" onclick='addToCartWl(${productJson})'>🛒 Thêm vào giỏ</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                container.innerHTML = `<div class="empty-wishlist" style="grid-column:1/-1"><p style="color:#ee4d2d">${err.message}</p></div>`;
            }
        }

        async function removeWishlist(productId) {
            const token = localStorage.getItem('authToken');
            try {
                await fetch(`${API_URL}/users/wishlist/${productId}`, {
                    method: 'DELETE', headers: { Authorization: 'Bearer ' + token }
                });
                renderWishlist();
            } catch { alert('Không thể xoá!'); }
        }

        function addToCartWl(product) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(i => String(i.id) === String(product.id));
            if (existing) existing.quantity++;
            else cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            // Update badge
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.querySelectorAll('#cart-count').forEach(el => el.textContent = count);
            // Toast
            const t = document.createElement('div');
            t.textContent = 'Đã thêm vào giỏ hàng!';
            t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#26aa99;color:#fff;padding:11px 26px;border-radius:10px;font-size:14px;z-index:99999';
            document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
        }

        document.addEventListener('DOMContentLoaded', renderWishlist);
    </script>
</body>
</html>
