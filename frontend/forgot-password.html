<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - MNghi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #fff5f3 0%, #fff 60%); display: flex; align-items: center; justify-content: center; padding: 24px; }
        .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(238,77,45,.12); width: 100%; max-width: 420px; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #ee4d2d, #fb6231); padding: 32px; text-align: center; }
        .auth-header .logo { color: #fff; font-size: 28px; font-weight: 800; }
        .auth-header p { color: rgba(255,255,255,.85); font-size: 13px; margin-top: 8px; }
        .auth-body { padding: 32px; }

        .steps { display: flex; align-items: center; margin-bottom: 28px; }
        .step-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; border: 2px solid #ddd; color: #aaa; background: #fff; transition: all .3s; flex-shrink: 0; }
        .step-dot.active { background: #ee4d2d; border-color: #ee4d2d; color: #fff; }
        .step-dot.done   { background: #26aa99; border-color: #26aa99; color: #fff; }
        .step-line { flex: 1; height: 2px; background: #eee; transition: background .3s; }
        .step-line.done { background: #26aa99; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 7px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s; }
        .form-group input:focus { border-color: #ee4d2d; }

        .otp-row { display: flex; gap: 8px; justify-content: center; }
        .otp-box { width: 46px; height: 54px; border: 2px solid #ddd; border-radius: 8px; font-size: 22px; font-weight: bold; text-align: center; outline: none; transition: border-color .2s; }
        .otp-box:focus { border-color: #ee4d2d; }
        .otp-timer { font-size: 12px; color: #888; text-align: center; margin-top: 8px; }

        .btn-primary { width: 100%; padding: 13px; background: #ee4d2d; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 4px; }
        .btn-primary:hover:not(:disabled) { background: #d43f22; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-resend { background: none; border: 1.5px solid #ddd; color: #666; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-resend:hover:not(:disabled) { border-color: #ee4d2d; color: #ee4d2d; }
        .btn-resend:disabled { color: #bbb; cursor: not-allowed; }

        .msg { font-size: 13px; text-align: center; min-height: 16px; margin: 10px 0 4px; }
        .msg.error   { color: #ee4d2d; }
        .msg.success { color: #26aa99; }

        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 40px; }
        .pw-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #aaa; }

        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .auth-footer a { color: #ee4d2d; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">🛍️ MNghi</div>
            <p id="header-sub">Khôi phục mật khẩu</p>
        </div>
        <div class="auth-body">
            <!-- Steps -->
            <div class="steps">
                <div class="step-dot active" id="dot-1">1</div>
                <div class="step-line" id="line-1"></div>
                <div class="step-dot" id="dot-2">2</div>
                <div class="step-line" id="line-2"></div>
                <div class="step-dot" id="dot-3">3</div>
            </div>

            <!-- Bước 1: Email -->
            <div id="step-1">
                <div class="form-group">
                    <label>📧 Email đã đăng ký</label>
                    <input type="email" id="fp-email" placeholder="ten@gmail.com" autocomplete="email">
                </div>
                <div class="msg" id="msg-1"></div>
                <button class="btn-primary" id="btn-send">Gửi mã xác nhận →</button>
            </div>

            <!-- Bước 2: OTP -->
            <div id="step-2" style="display:none">
                <p style="font-size:13px;color:#666;text-align:center;margin-bottom:20px">
                    Mã OTP đã gửi đến<br><strong id="display-email" style="color:#ee4d2d"></strong>
                </p>
                <div class="otp-row">
                    <input class="otp-box" maxlength="1" id="otp-0">
                    <input class="otp-box" maxlength="1" id="otp-1">
                    <input class="otp-box" maxlength="1" id="otp-2">
                    <input class="otp-box" maxlength="1" id="otp-3">
                    <input class="otp-box" maxlength="1" id="otp-4">
                    <input class="otp-box" maxlength="1" id="otp-5">
                </div>
                <div class="otp-timer" id="otp-timer"></div>
                <div class="msg" id="msg-2"></div>
                <button class="btn-primary" id="btn-verify">Xác nhận mã →</button>
                <button class="btn-resend" id="btn-resend" disabled>Gửi lại mã</button>
            </div>

            <!-- Bước 3: Mật khẩu mới -->
            <div id="step-3" style="display:none">
                <div style="background:#e8f5e9;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:#2e7d32">
                    ✅ Xác nhận thành công! Tạo mật khẩu mới.
                </div>
                <div class="form-group">
                    <label>🔒 Mật khẩu mới</label>
                    <div class="pw-wrap">
                        <input type="password" id="new-pw" placeholder="Tối thiểu 6 ký tự">
                        <button type="button" class="pw-eye" id="eye1">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>🔒 Xác nhận mật khẩu</label>
                    <div class="pw-wrap">
                        <input type="password" id="confirm-pw" placeholder="Nhập lại mật khẩu mới">
                        <button type="button" class="pw-eye" id="eye2">👁️</button>
                    </div>
                </div>
                <div class="msg" id="msg-3"></div>
                <button class="btn-primary" id="btn-reset">Đặt lại mật khẩu</button>
            </div>

            <div class="auth-footer">
                <a href="login.html">← Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3001/api';
        let fpEmail = '';
        let otpValue = '';
        let timerInterval = null;

        function setMsg(id, text, type = 'error') {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function updateSteps(current) {
            [1,2,3].forEach(i => {
                const dot  = document.getElementById('dot-' + i);
                const line = document.getElementById('line-' + i);
                if (i < current)       { dot.className = 'step-dot done'; dot.textContent = '✓'; }
                else if (i === current){ dot.className = 'step-dot active'; dot.textContent = i; }
                else                   { dot.className = 'step-dot'; dot.textContent = i; }
                if (line) line.className = 'step-line' + (i < current ? ' done' : '');
            });
        }

        function showStep(n) {
            [1,2,3].forEach(i => document.getElementById('step-' + i).style.display = i === n ? '' : 'none');
            updateSteps(n);
        }

        function startTimer(sec = 600) {
            clearInterval(timerInterval);
            const el = document.getElementById('otp-timer');
            const resendBtn = document.getElementById('btn-resend');
            resendBtn.disabled = true;
            timerInterval = setInterval(() => {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                el.textContent = `Mã hết hạn sau ${m}:${String(s).padStart(2,'0')}`;
                sec--;
                if (sec < 0) {
                    clearInterval(timerInterval);
                    el.textContent = 'Mã đã hết hạn.';
                    el.style.color = '#ee4d2d';
                    resendBtn.disabled = false;
                }
                if (sec === 540) resendBtn.disabled = false;
            }, 1000);
        }

        function getOTP() {
            return [0,1,2,3,4,5].map(i => document.getElementById('otp-' + i).value).join('');
        }

        // OTP box auto-advance
        document.addEventListener('DOMContentLoaded', () => {
            for (let i = 0; i < 6; i++) {
                const box = document.getElementById('otp-' + i);
                box.addEventListener('input', () => {
                    box.value = box.value.replace(/\D/g,'').slice(-1);
                    if (box.value && i < 5) document.getElementById('otp-' + (i+1)).focus();
                });
                box.addEventListener('keydown', e => {
                    if (e.key === 'Backspace' && !box.value && i > 0)
                        document.getElementById('otp-' + (i-1)).focus();
                });
                box.addEventListener('paste', e => {
                    e.preventDefault();
                    const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
                    p.split('').slice(0,6).forEach((ch, j) => {
                        const b = document.getElementById('otp-' + j);
                        if (b) b.value = ch;
                    });
                    document.getElementById('otp-' + Math.min(p.length, 5)).focus();
                });
            }
        });

        // Step 1: Gửi OTP
        document.getElementById('btn-send').addEventListener('click', async () => {
            const email = document.getElementById('fp-email').value.trim();
            const btn = document.getElementById('btn-send');
            if (!email) { setMsg('msg-1', 'Vui lòng nhập email!'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setMsg('msg-1', 'Email không hợp lệ!'); return; }

            btn.disabled = true; btn.textContent = '⏳ Đang gửi...';
            setMsg('msg-1', '');
            try {
                const res  = await fetch(`${API}/auth/forgot-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    fpEmail = email;
                    document.getElementById('display-email').textContent = email;
                    showStep(2);
                    startTimer();
                    setMsg('msg-2', '📬 Kiểm tra hộp thư (kể cả Spam)', 'success');
                } else {
                    setMsg('msg-1', data.error || 'Gửi thất bại');
                }
            } catch { setMsg('msg-1', 'Không kết nối được server!'); }
            btn.disabled = false; btn.textContent = 'Gửi mã xác nhận →';
        });

        document.getElementById('fp-email').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-send').click();
        });

        // Gửi lại
        document.getElementById('btn-resend').addEventListener('click', () => {
            showStep(1);
            document.getElementById('fp-email').value = fpEmail;
            clearInterval(timerInterval);
            [0,1,2,3,4,5].forEach(i => document.getElementById('otp-' + i).value = '');
        });

        // Step 2: Xác nhận OTP
        document.getElementById('btn-verify').addEventListener('click', () => {
            const otp = getOTP();
            if (otp.length < 6) { setMsg('msg-2', 'Vui lòng nhập đủ 6 chữ số!'); return; }
            otpValue = otp;
            clearInterval(timerInterval);
            showStep(3);
            document.getElementById('new-pw').focus();
        });

        // Step 3: Đặt lại mật khẩu
        document.getElementById('btn-reset').addEventListener('click', async () => {
            const newPw     = document.getElementById('new-pw').value;
            const confirmPw = document.getElementById('confirm-pw').value;
            const btn       = document.getElementById('btn-reset');

            if (newPw.length < 6) { setMsg('msg-3', 'Mật khẩu phải có ít nhất 6 ký tự!'); return; }
            if (newPw !== confirmPw) { setMsg('msg-3', 'Mật khẩu xác nhận không khớp!'); return; }

            btn.disabled = true; btn.textContent = '⏳ Đang xử lý...';
            setMsg('msg-3', '');
            try {
                const res  = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: fpEmail, otp: otpValue, newPassword: newPw })
                });
                const data = await res.json();
                if (res.ok) {
                    setMsg('msg-3', '✅ Đặt lại mật khẩu thành công! Đang chuyển trang...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    setMsg('msg-3', data.error || 'Thất bại, vui lòng thử lại');
                    if (data.error?.includes('OTP')) showStep(2);
                }
            } catch { setMsg('msg-3', 'Không kết nối được server!'); }
            btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu';
        });

        // Show/hide password
        ['eye1','eye2'].forEach((id, idx) => {
            document.getElementById(id).addEventListener('click', () => {
                const inp = document.getElementById(idx === 0 ? 'new-pw' : 'confirm-pw');
                const btn = document.getElementById(id);
                inp.type = inp.type === 'password' ? 'text' : 'password';
                btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
            });
        });
    </script>
</body>
</html>
