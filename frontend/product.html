<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - MNghi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pd-page { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
        .pd-breadcrumb { font-size: 12px; color: #888; margin-bottom: 14px; }
        .pd-breadcrumb a { color: #ee4d2d; text-decoration: none; }
        .pd-breadcrumb a:hover { text-decoration: underline; }

        /* Main card */
        .pd-card { background: #fff; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); display: flex; gap: 0; margin-bottom: 16px; }

        /* Left: image */
        .pd-img-area { width: 400px; flex-shrink: 0; padding: 24px; border-right: 1px solid #f5f5f5; }
        .pd-main-img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 6px; background: #fafafa; }
        .pd-badge { display: inline-block; background: #ee4d2d; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 3px; margin-bottom: 8px; }

        /* Right: info */
        .pd-info { flex: 1; padding: 24px; }
        .pd-name { font-size: 20px; font-weight: 700; color: #222; margin: 0 0 12px; line-height: 1.4; }
        .pd-meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #888; margin-bottom: 16px; flex-wrap: wrap; }
        .pd-meta .stars { color: #f6a500; }
        .pd-meta .sold { color: #666; }
        .pd-price-box { background: #fafafa; padding: 16px; border-radius: 6px; margin-bottom: 20px; }
        .pd-price { font-size: 30px; font-weight: 700; color: #ee4d2d; }
        .pd-old-price { font-size: 16px; color: #aaa; text-decoration: line-through; margin-left: 10px; }
        .pd-discount-badge { background: #ee4d2d; color: #fff; font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-left: 8px; }
        .pd-freeship { color: #26aa99; font-size: 13px; font-weight: 600; margin-top: 8px; }

        .pd-attrs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; font-size: 14px; }
        .pd-attr-row { display: flex; gap: 10px; align-items: center; }
        .pd-attr-label { color: #888; width: 110px; flex-shrink: 0; }
        .pd-attr-val { color: #333; font-weight: 500; }

        .pd-qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .pd-qty-label { font-size: 14px; color: #888; }
        .pd-qty-ctrl { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .pd-qty-ctrl button { width: 32px; height: 32px; background: #f5f5f5; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .pd-qty-ctrl button:hover { background: #eee; }
        .pd-qty-ctrl input { width: 50px; height: 32px; border: none; text-align: center; font-size: 14px; outline: none; }
        .pd-stock { font-size: 12px; color: #888; }
        .pd-stock.low { color: #ee4d2d; }

        .pd-btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .pd-btn-cart { flex: 1; min-width: 160px; padding: 14px; border: 2px solid #ee4d2d; background: #fff5f3; color: #ee4d2d; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; }
        .pd-btn-cart:hover { background: #ee4d2d; color: #fff; }
        .pd-btn-buy  { flex: 1; min-width: 160px; padding: 14px; border: none; background: #ee4d2d; color: #fff; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; }
        .pd-btn-buy:hover { background: #d43f22; }
        .pd-btn-wish { width: 48px; height: 50px; border: 1.5px solid #ddd; background: #fff; border-radius: 6px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .pd-btn-wish:hover { border-color: #ee4d2d; }
        .pd-btn-wish.active { background: #fff5f3; border-color: #ee4d2d; }

        /* Tabs */
        .pd-tabs { background: #fff; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
        .pd-tab-nav { display: flex; border-bottom: 2px solid #f5f5f5; }
        .pd-tab-btn { padding: 14px 20px; font-size: 14px; font-weight: 600; color: #666; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
        .pd-tab-btn.active { color: #ee4d2d; border-bottom-color: #ee4d2d; }
        .pd-tab-content { padding: 24px; display: none; }
        .pd-tab-content.active { display: block; }
        .pd-desc { font-size: 14px; line-height: 1.8; color: #444; white-space: pre-wrap; }

        /* Specs table */
        .specs-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .specs-table tr:nth-child(odd) { background: #fafafa; }
        .specs-table td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
        .specs-table td:first-child { width: 160px; color: #888; font-weight: 500; }

        /* Reviews */
        .review-stats { display: flex; gap: 20px; align-items: center; background: #fafafa; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .review-avg-num { font-size: 48px; font-weight: 700; color: #ee4d2d; line-height: 1; }
        .review-avg-stars { color: #f6a500; font-size: 20px; }
        .review-avg-count { color: #888; font-size: 13px; margin-top: 4px; }
        .review-bars { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .review-bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .review-bar-row span:first-child { width: 40px; color: #888; text-align: right; }
        .review-bar-track { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .review-bar-fill  { height: 100%; background: #f6a500; border-radius: 3px; transition: width .4s; }
        .review-bar-row .cnt { width: 24px; color: #888; }

        .review-item { border-bottom: 1px solid #f5f5f5; padding: 16px 0; }
        .review-item:last-child { border-bottom: none; }
        .review-user { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .review-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ee4d2d; color: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        .review-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .review-user-name { font-weight: 600; font-size: 13px; }
        .review-stars { color: #f6a500; font-size: 14px; }
        .review-date  { color: #bbb; font-size: 11px; margin-left: auto; }
        .review-comment { font-size: 14px; color: #444; line-height: 1.6; margin: 0; }

        .review-form-wrap { border-top: 2px solid #f5f5f5; padding-top: 20px; margin-top: 10px; }
        .review-form-wrap h4 { font-size: 15px; margin: 0 0 14px; color: #333; }
        .star-select { display: flex; gap: 4px; margin-bottom: 12px; }
        .star-select span { font-size: 28px; color: #ddd; cursor: pointer; transition: color .1s; -webkit-user-select: none; user-select: none; }
        .star-select span.active { color: #f6a500; }
        .review-textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 14px; outline: none; resize: vertical; box-sizing: border-box; min-height: 80px; }
        .review-textarea:focus { border-color: #ee4d2d; }
        .btn-submit-review { padding: 10px 28px; background: #ee4d2d; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-submit-review:hover { background: #d43f22; }
        .btn-submit-review:disabled { background: #ccc; cursor: not-allowed; }
        .review-msg { font-size: 13px; margin-top: 8px; }
        .review-msg.ok  { color: #26aa99; }
        .review-msg.err { color: #ee4d2d; }

        /* Related */
        .pd-section-title { font-size: 17px; font-weight: 700; color: #333; margin-bottom: 14px; padding-left: 10px; border-left: 4px solid #ee4d2d; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }

        @media (max-width: 768px) {
            .pd-card { flex-direction: column; }
            .pd-img-area { width: 100%; border-right: none; border-bottom: 1px solid #f5f5f5; padding: 16px; }
            .pd-btn-row { flex-direction: column; }
            .review-stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="shopee-header">
        <div class="header-main">
            <div class="logo">
                <svg width="36" height="36" viewBox="0 0 50 50" fill="white"><path d="M25 2C18 2 12 7 11 14H8a3 3 0 0 0-3 3.2l2 22A3 3 0 0 0 10 42h30a3 3 0 0 0 3-2.8l2-22A3 3 0 0 0 42 14h-3C38 7 32 2 25 2zm0 4c5 0 9 3.6 9.9 8H15.1C16 9.6 20 6 25 6zm-6 16a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm12 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
                <a href="index.html" style="color:white;text-decoration:none">MNghi</a>
            </div>
            <div class="header-center">
                <div class="search-bar shopee-search">
                    <input type="text" id="search-input" placeholder="Tìm kiếm trên MNghi...">
                    <button id="search-btn" style="width:80px;font-size:14px;font-weight:600">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Tìm
                    </button>
                </div>
            </div>
            <div class="actions-right">
                <div id="user-actions"></div>
                <a href="cart.html" class="cart-icon-btn">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-15.5-16h-.5c-.55 0-1 .45-1 1s.45 1 1 1h.5l3.5 7.39-1.35 2.44C3.52 14.37 4.48 16 6 16h13c.55 0 1-.45 1-1s-.45-1-1-1H6l1.1-2h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 18.96 3H5.21l-.42-.85A1 1 0 0 0 3.9 2H1.5z"/></svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
        <nav class="category-nav">
            <ul>
                <li><a href="category.html?cat=Điện thoại">Điện thoại</a></li>
                <li><a href="category.html?cat=Laptop">Laptop</a></li>
                <li><a href="category.html?cat=Thời trang">Thời trang</a></li>
                <li><a href="category.html?cat=Đồ gia dụng">Đồ gia dụng</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="pd-page">
            <!-- Breadcrumb -->
            <div class="pd-breadcrumb" id="breadcrumb">
                <a href="index.html">Trang chủ</a> › <span id="bc-category"></span> › <span id="bc-name"></span>
            </div>

            <!-- Loading -->
            <div id="pd-loading" style="text-align:center;padding:60px;color:#aaa;font-size:15px">⏳ Đang tải...</div>

            <!-- Main card -->
            <div class="pd-card" id="pd-main" style="display:none">
                <!-- Ảnh -->
                <div class="pd-img-area">
                    <div id="discount-top"></div>
                    <img class="pd-main-img" id="pd-img" src="" alt="">
                </div>
                <!-- Info -->
                <div class="pd-info">
                    <h1 class="pd-name" id="pd-name"></h1>
                    <div class="pd-meta">
                        <span><span class="stars" id="pd-stars"></span> <span id="pd-rating" style="color:#f6a500;font-weight:600"></span></span>
                        <span style="color:#ddd">|</span>
                        <span id="pd-review-count" class="sold"></span>
                        <span style="color:#ddd">|</span>
                        <span id="pd-sold" class="sold"></span>
                    </div>
                    <div class="pd-price-box">
                        <span class="pd-price" id="pd-price"></span>
                        <span class="pd-old-price" id="pd-old-price" style="display:none"></span>
                        <span class="pd-discount-badge" id="pd-discount-badge" style="display:none"></span>
                        <div class="pd-freeship" id="pd-freeship" style="display:none">✅ Miễn phí vận chuyển</div>
                    </div>
                    <div class="pd-attrs">
                        <div class="pd-attr-row" id="attr-brand" style="display:none">
                            <span class="pd-attr-label">Thương hiệu</span>
                            <span class="pd-attr-val" id="pd-brand"></span>
                        </div>
                        <div class="pd-attr-row" id="attr-category">
                            <span class="pd-attr-label">Danh mục</span>
                            <span class="pd-attr-val" id="pd-category"></span>
                        </div>
                        <div class="pd-attr-row" id="attr-color" style="display:none">
                            <span class="pd-attr-label">Màu sắc</span>
                            <span class="pd-attr-val" id="pd-color"></span>
                        </div>
                        <div class="pd-attr-row" id="attr-capacity" style="display:none">
                            <span class="pd-attr-label">Dung lượng</span>
                            <span class="pd-attr-val" id="pd-capacity"></span>
                        </div>
                    </div>

                    <!-- Số lượng -->
                    <div class="pd-qty-row">
                        <span class="pd-qty-label">Số lượng</span>
                        <div class="pd-qty-ctrl">
                            <button id="qty-minus">−</button>
                            <input type="number" id="qty-input" value="1" min="1">
                            <button id="qty-plus">+</button>
                        </div>
                        <span class="pd-stock" id="pd-stock-info"></span>
                    </div>

                    <!-- Buttons -->
                    <div class="pd-btn-row">
                        <button class="pd-btn-cart" id="btn-add-cart">🛒 Thêm vào giỏ</button>
                        <button class="pd-btn-buy"  id="btn-buy-now">⚡ Mua ngay</button>
                        <button class="pd-btn-wish" id="btn-wishlist" title="Yêu thích">🤍</button>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="pd-tabs" id="pd-tabs" style="display:none">
                <div class="pd-tab-nav">
                    <button class="pd-tab-btn active" data-tab="desc">Mô tả sản phẩm</button>
                    <button class="pd-tab-btn" data-tab="specs">Thông số kỹ thuật</button>
                    <button class="pd-tab-btn" data-tab="reviews">Đánh giá <span id="tab-review-count"></span></button>
                </div>
                <div class="pd-tab-content active" id="tab-desc">
                    <div class="pd-desc" id="pd-desc">Chưa có mô tả cho sản phẩm này.</div>
                </div>
                <div class="pd-tab-content" id="tab-specs">
                    <table class="specs-table" id="specs-table"></table>
                </div>
                <div class="pd-tab-content" id="tab-reviews">
                    <div id="review-stats-area"></div>
                    <div id="reviews-list"></div>
                    <div class="review-form-wrap" id="review-form-area"></div>
                </div>
            </div>

            <!-- Sản phẩm liên quan -->
            <div id="related-area" style="display:none;margin-bottom:30px">
                <div class="pd-section-title" id="related-title"></div>
                <div class="related-grid" id="related-grid"></div>
            </div>
        </div>
    </main>

    <footer style="background:#222;color:#aaa;text-align:center;padding:20px;font-size:13px">
        <p>&copy; 2026 MNghi. Tất cả quyền được bảo lưu.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        const API = 'http://localhost:3001/api';
        const params = new URLSearchParams(location.search);
        const productId = params.get('id');
        let currentProduct = null;
        let selectedRating = 0;

        if (!productId) { window.location.href = 'index.html'; }

        function fmtPrice(n) {
            return Number(n).toLocaleString('vi-VN') + '₫';
        }
        function stars(n) {
            const full = Math.round(n);
            return '★'.repeat(full) + '☆'.repeat(5 - full);
        }

        // ── Load sản phẩm ────────────────────────────────────────
        async function loadProduct() {
            try {
                const res = await fetch(`${API}/products/${productId}`);
                if (!res.ok) throw new Error();
                const p = await res.json();
                currentProduct = p;
                renderProduct(p);
                loadReviews();
                loadRelated(p);
                saveRecentlyViewed(p);
            } catch {
                document.getElementById('pd-loading').innerHTML = '<p style="color:#ee4d2d">Không tìm thấy sản phẩm.</p>';
            }
        }

        function renderProduct(p) {
            document.title = p.name + ' - MNghi';
            document.getElementById('pd-loading').style.display = 'none';
            document.getElementById('pd-main').style.display = 'flex';
            document.getElementById('pd-tabs').style.display = 'block';

            // Breadcrumb
            document.getElementById('bc-category').innerHTML = `<a href="category.html?cat=${encodeURIComponent(p.category || '')}">${p.category || ''}</a>`;
            document.getElementById('bc-name').textContent = p.name;

            // Image
            document.getElementById('pd-img').src = p.image || 'images/placeholder.png';
            document.getElementById('pd-img').alt = p.name;

            // Discount badge
            if (p.discount > 0) {
                document.getElementById('discount-top').innerHTML = `<span class="pd-badge">-${p.discount}%</span>`;
            }

            // Name
            document.getElementById('pd-name').textContent = p.name;

            // Rating
            const rating = parseFloat(p.rating) || 5;
            document.getElementById('pd-stars').textContent = stars(rating);
            document.getElementById('pd-stars').style.color = '#f6a500';
            document.getElementById('pd-rating').textContent = rating.toFixed(1);
            document.getElementById('pd-review-count').textContent = `${p.review_count || 0} đánh giá`;
            document.getElementById('pd-sold').textContent = `Đã bán ${p.sold || 0}`;
            document.getElementById('tab-review-count').textContent = p.review_count > 0 ? `(${p.review_count})` : '';

            // Price
            const priceNum = p.priceNumber || p.price_number || 0;
            document.getElementById('pd-price').textContent = fmtPrice(priceNum);
            if (p.discount > 0 && priceNum > 0) {
                const oldPrice = Math.round(priceNum / (1 - p.discount / 100));
                document.getElementById('pd-old-price').textContent = fmtPrice(oldPrice);
                document.getElementById('pd-old-price').style.display = 'inline';
                document.getElementById('pd-discount-badge').textContent = `-${p.discount}%`;
                document.getElementById('pd-discount-badge').style.display = 'inline';
            }
            if (p.freeShip || p.free_ship) document.getElementById('pd-freeship').style.display = 'block';

            // Attributes
            if (p.brand) { document.getElementById('pd-brand').textContent = p.brand; document.getElementById('attr-brand').style.display = 'flex'; }
            if (p.category) document.getElementById('pd-category').textContent = p.category;
            if (p.color) { document.getElementById('pd-color').textContent = p.color; document.getElementById('attr-color').style.display = 'flex'; }
            if (p.capacity) { document.getElementById('pd-capacity').textContent = p.capacity; document.getElementById('attr-capacity').style.display = 'flex'; }

            // Stock
            const stock = p.stock || 0;
            const stockEl = document.getElementById('pd-stock-info');
            stockEl.textContent = stock > 0 ? `Còn ${stock} sản phẩm` : 'Hết hàng';
            stockEl.className = 'pd-stock' + (stock <= 5 && stock > 0 ? ' low' : '');
            document.getElementById('qty-input').max = stock;
            if (stock === 0) {
                document.getElementById('btn-add-cart').disabled = true;
                document.getElementById('btn-buy-now').disabled = true;
            }

            // Description tab
            document.getElementById('pd-desc').textContent = p.description || 'Chưa có mô tả cho sản phẩm này.';

            // Specs tab
            const specs = [
                ['Tên sản phẩm', p.name],
                ['Thương hiệu', p.brand],
                ['Danh mục', p.category],
                ['Màu sắc', p.color],
                ['Dung lượng', p.capacity],
                ['Tình trạng', stock > 0 ? 'Còn hàng' : 'Hết hàng'],
                ['Vận chuyển', (p.freeShip || p.free_ship) ? 'Miễn phí' : 'Có phí'],
            ].filter(([, v]) => v);
            document.getElementById('specs-table').innerHTML = specs.map(([k,v]) =>
                `<tr><td>${k}</td><td>${v}</td></tr>`
            ).join('');

            // Wishlist state
            const wl = JSON.parse(localStorage.getItem('wishlist_ids') || '[]');
            if (wl.includes(String(productId))) {
                document.getElementById('btn-wishlist').textContent = '❤️';
                document.getElementById('btn-wishlist').classList.add('active');
            }
        }

        // ── Quantity controls ────────────────────────────────────
        document.getElementById('qty-minus').addEventListener('click', () => {
            const inp = document.getElementById('qty-input');
            if (+inp.value > 1) inp.value = +inp.value - 1;
        });
        document.getElementById('qty-plus').addEventListener('click', () => {
            const inp = document.getElementById('qty-input');
            const max = +inp.max || 999;
            if (+inp.value < max) inp.value = +inp.value + 1;
        });

        // ── Add to cart ──────────────────────────────────────────
        document.getElementById('btn-add-cart').addEventListener('click', () => {
            if (!currentProduct) return;
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            const p = currentProduct;
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(i => String(i.id) === String(p.id));
            if (existing) existing.quantity += qty;
            else cart.push({
                id: p.id, name: p.name,
                price: p.priceNumber || p.price_number || 0,
                image: p.image, quantity: qty
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            document.querySelectorAll('#cart-count').forEach(el => el.textContent = cart.reduce((s,i)=>s+i.quantity,0));
            showToast('Đã thêm vào giỏ hàng!');
        });

        // ── Buy now ──────────────────────────────────────────────
        document.getElementById('btn-buy-now').addEventListener('click', () => {
            document.getElementById('btn-add-cart').click();
            window.location.href = 'cart.html';
        });

        // ── Wishlist ─────────────────────────────────────────────
        document.getElementById('btn-wishlist').addEventListener('click', async () => {
            const token = getToken();
            if (!token) { showToast('Cần đăng nhập để thêm yêu thích!', 'warn'); return; }
            const btn = document.getElementById('btn-wishlist');
            const isActive = btn.classList.contains('active');
            try {
                if (isActive) {
                    await fetch(`${API}/users/wishlist/${productId}`, {
                        method: 'DELETE', headers: { Authorization: 'Bearer ' + token }
                    });
                    btn.textContent = '🤍'; btn.classList.remove('active');
                    showToast('Đã bỏ yêu thích');
                } else {
                    await fetch(`${API}/users/wishlist`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ productId })
                    });
                    btn.textContent = '❤️'; btn.classList.add('active');
                    showToast('Đã thêm vào yêu thích!');
                }
            } catch { showToast('Lỗi, thử lại sau!', 'error'); }
        });

        // ── Tabs ─────────────────────────────────────────────────
        document.querySelectorAll('.pd-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pd-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.pd-tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        // ── Reviews ──────────────────────────────────────────────
        async function loadReviews() {
            try {
                const res = await fetch(`${API}/reviews/${productId}`);
                const { reviews, stats } = await res.json();
                renderReviewStats(stats, reviews.length);
                renderReviewList(reviews);
                renderReviewForm();
            } catch { document.getElementById('reviews-list').innerHTML = '<p style="color:#aaa;padding:16px">Chưa có đánh giá.</p>'; }
        }

        function renderReviewStats(s, total) {
            if (!s || s.total == 0) {
                document.getElementById('review-stats-area').innerHTML = '<p style="color:#aaa;padding:16px 0">Chưa có đánh giá nào.</p>';
                return;
            }
            const avg = parseFloat(s.avg_rating) || 0;
            const bars = [
                ['5 ★', s.five], ['4 ★', s.four], ['3 ★', s.three], ['2 ★', s.two], ['1 ★', s.one]
            ];
            document.getElementById('review-stats-area').innerHTML = `
                <div class="review-stats">
                    <div style="text-align:center">
                        <div class="review-avg-num">${avg.toFixed(1)}</div>
                        <div class="review-avg-stars">${stars(avg)}</div>
                        <div class="review-avg-count">${total} đánh giá</div>
                    </div>
                    <div class="review-bars">
                        ${bars.map(([label, cnt]) => `
                        <div class="review-bar-row">
                            <span>${label}</span>
                            <div class="review-bar-track">
                                <div class="review-bar-fill" style="width:${total > 0 ? Math.round(cnt/total*100) : 0}%"></div>
                            </div>
                            <span class="cnt">${cnt || 0}</span>
                        </div>`).join('')}
                    </div>
                </div>`;
        }

        function renderReviewList(reviews) {
            if (!reviews.length) {
                document.getElementById('reviews-list').innerHTML = '<p style="color:#aaa;padding:8px 0">Chưa có đánh giá. Hãy là người đầu tiên!</p>';
                return;
            }
            document.getElementById('reviews-list').innerHTML = reviews.map(r => {
                const name = r.displayname || r.username;
                const avatar = r.avatar_url
                    ? `<img src="${r.avatar_url}" alt="">`
                    : `<span>${name[0].toUpperCase()}</span>`;
                return `
                <div class="review-item">
                    <div class="review-user">
                        <div class="review-avatar">${avatar}</div>
                        <span class="review-user-name">${name}</span>
                        <span class="review-stars">${stars(r.rating)}</span>
                        <span class="review-date">${new Date(r.created_at).toLocaleDateString('vi-VN')}</span>
                    </div>
                    <p class="review-comment">${r.comment || ''}</p>
                </div>`;
            }).join('');
        }

        function renderReviewForm() {
            const token = getToken();
            const area = document.getElementById('review-form-area');
            if (!token) {
                area.innerHTML = `<p style="font-size:13px;color:#888;text-align:center;padding:16px 0"><a href="login.html" style="color:#ee4d2d;font-weight:600">Đăng nhập</a> để viết đánh giá</p>`;
                return;
            }
            area.innerHTML = `
                <h4>✍️ Viết đánh giá của bạn</h4>
                <div class="star-select" id="star-select">
                    ${[1,2,3,4,5].map(i => `<span data-val="${i}">★</span>`).join('')}
                </div>
                <p id="star-label" style="font-size:12px;color:#888;margin-bottom:10px">Chọn điểm đánh giá</p>
                <textarea class="review-textarea" id="review-text" placeholder="Chia sẻ trải nghiệm của bạn về sản phẩm..."></textarea>
                <div><button class="btn-submit-review" id="btn-submit-review">Gửi đánh giá</button></div>
                <div class="review-msg" id="review-msg"></div>`;

            const starLabels = ['','Tệ','Không hay','Bình thường','Tốt','Xuất sắc'];
            document.querySelectorAll('#star-select span').forEach(s => {
                s.addEventListener('mouseover', () => highlight(+s.dataset.val));
                s.addEventListener('mouseout',  () => highlight(selectedRating));
                s.addEventListener('click', () => {
                    selectedRating = +s.dataset.val;
                    highlight(selectedRating);
                    document.getElementById('star-label').textContent = starLabels[selectedRating];
                });
            });

            document.getElementById('btn-submit-review').addEventListener('click', submitReview);
        }

        function highlight(val) {
            document.querySelectorAll('#star-select span').forEach(s =>
                s.classList.toggle('active', +s.dataset.val <= val)
            );
        }

        async function submitReview() {
            const token = getToken();
            const comment = document.getElementById('review-text').value.trim();
            const msgEl = document.getElementById('review-msg');
            const btn = document.getElementById('btn-submit-review');

            if (!selectedRating) { msgEl.textContent = '⚠️ Vui lòng chọn số sao!'; msgEl.className = 'review-msg err'; return; }

            btn.disabled = true; btn.textContent = 'Đang gửi...';
            msgEl.textContent = '';

            try {
                const res = await fetch(`${API}/reviews/${productId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify({ rating: selectedRating, comment })
                });
                const data = await res.json();
                if (res.ok) {
                    msgEl.textContent = '✅ ' + data.message;
                    msgEl.className = 'review-msg ok';
                    document.getElementById('review-text').value = '';
                    selectedRating = 0; highlight(0);
                    setTimeout(loadReviews, 600);
                } else {
                    msgEl.textContent = data.error || 'Gửi thất bại';
                    msgEl.className = 'review-msg err';
                }
            } catch { msgEl.textContent = 'Không kết nối được server!'; msgEl.className = 'review-msg err'; }
            btn.disabled = false; btn.textContent = 'Gửi đánh giá';
        }

        // ── Related products ─────────────────────────────────────
        async function loadRelated(p) {
            try {
                const res = await fetch(`${API}/products?category=${encodeURIComponent(p.category || '')}`);
                const all = await res.json();
                const related = all.filter(r => r.id != productId).slice(0, 8);
                if (!related.length) return;
                document.getElementById('related-title').textContent = `Sản phẩm cùng danh mục: ${p.category}`;
                document.getElementById('related-grid').innerHTML = related.map(r => productCard(r)).join('');
                document.getElementById('related-area').style.display = 'block';
            } catch {}
        }

        function productCard(p) {
            const price = p.priceNumber || p.price_number || 0;
            return `
            <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit">
                <div style="background:#fff;border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,0.07);overflow:hidden;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow='0 1px 6px rgba(0,0,0,0.07)'">
                    <img src="${p.image||''}" alt="${p.name}" style="width:100%;aspect-ratio:1;object-fit:contain;background:#fafafa">
                    <div style="padding:10px">
                        <div style="font-size:13px;font-weight:600;color:#333;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px">${p.name}</div>
                        <div style="color:#ee4d2d;font-weight:700;font-size:14px">${fmtPrice(price)}</div>
                        ${p.discount > 0 ? `<span style="background:#ee4d2d;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px">-${p.discount}%</span>` : ''}
                    </div>
                </div>
            </a>`;
        }

        // ── Recently viewed ──────────────────────────────────────
        function saveRecentlyViewed(p) {
            let rv = JSON.parse(localStorage.getItem('recently_viewed') || '[]');
            rv = rv.filter(id => id != p.id);
            rv.unshift(p.id);
            localStorage.setItem('recently_viewed', JSON.stringify(rv.slice(0, 10)));
        }

        // Search
        document.getElementById('search-btn').addEventListener('click', () => {
            const q = document.getElementById('search-input').value.trim();
            if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`;
        });
        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('search-btn').click();
        });

        loadProduct();
    </script>
</body>
</html>
