<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục - MNghi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cat-page { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
        .cat-breadcrumb { font-size: 13px; color: #888; margin-bottom: 14px; }
        .cat-breadcrumb a { color: #ee4d2d; text-decoration: none; }
        .cat-breadcrumb a:hover { text-decoration: underline; }
        .cat-toolbar {
            display: flex; gap: 10px; flex-wrap: wrap;
            background: white; padding: 14px 16px;
            border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            margin-bottom: 20px; align-items: center;
        }
        .cat-toolbar select {
            padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; outline: none; cursor: pointer; background: white;
        }
        .cat-toolbar select:focus { border-color: #ee4d2d; }
        .cat-result-count { font-size: 13px; color: #888; margin-left: auto; white-space: nowrap; }
        .no-result {
            text-align: center; padding: 60px 20px; color: #aaa;
        }
        .no-result .no-result-icon { font-size: 56px; margin-bottom: 12px; }
        .no-result p { font-size: 15px; margin: 0 0 20px; }
        .no-result a {
            display: inline-block; padding: 10px 24px; background: #ee4d2d;
            color: white; border-radius: 6px; text-decoration: none; font-weight: bold;
        }
        .cat-header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
        .cat-header-row h2 { font-size: 20px; color: #333; margin: 0; }
    </style>
</head>
<body>
    <header class="shopee-header">
        <div class="header-main">
            <div class="logo">
                <svg width="36" height="36" viewBox="0 0 50 50" fill="white"><path d="M25 2C18 2 12 7 11 14H8a3 3 0 0 0-3 3.2l2 22A3 3 0 0 0 10 42h30a3 3 0 0 0 3-2.8l2-22A3 3 0 0 0 42 14h-3C38 7 32 2 25 2zm0 4c5 0 9 3.6 9.9 8H15.1C16 9.6 20 6 25 6zm-6 16a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm12 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
                <a href="index.html" style="color:white;text-decoration:none">MNghi</a>
            </div>
            <div class="header-center">
                <div class="search-bar shopee-search">
                    <input type="text" id="search-input" placeholder="Tìm kiếm trên MNghi...">
                    <button id="search-btn" style="width:80px;font-size:14px;font-weight:600;gap:4px">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Tìm
                    </button>
                    <div id="autocomplete" class="autocomplete-list" style="display:none"></div>
                </div>
            </div>
            <div class="actions-right">
                <div class="user-actions" id="user-actions"></div>
                <a href="cart.html" class="cart-icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-15.5-16h-.5c-.55 0-1 .45-1 1s.45 1 1 1h.5l3.5 7.39-1.35 2.44C3.52 14.37 4.48 16 6 16h13c.55 0 1-.45 1-1s-.45-1-1-1H6l1.1-2h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 18.96 3H5.21l-.42-.85A1 1 0 0 0 3.9 2H1.5z"/></svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
        <div class="top-menu">
            <ul class="top-menu-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="category.html?cat=Điện thoại">Điện thoại</a></li>
                <li><a href="category.html?cat=Laptop">Laptop</a></li>
                <li><a href="category.html?cat=Thời trang">Thời trang</a></li>
                <li><a href="category.html?cat=Đồ gia dụng">Đồ gia dụng</a></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="cat-page">
            <div class="cat-breadcrumb" id="cat-breadcrumb">
                <a href="index.html">Trang chủ</a> &gt; <span id="cat-crumb-name">Danh mục</span>
            </div>

            <div class="cat-header-row">
                <h2 id="cat-title">Tất cả sản phẩm</h2>
            </div>

            <div class="cat-toolbar">
                <select id="filter-brand">
                    <option value="">Tất cả thương hiệu</option>
                </select>
                <select id="filter-sort">
                    <option value="">Mặc định</option>
                    <option value="price-asc">Giá tăng dần</option>
                    <option value="price-desc">Giá giảm dần</option>
                    <option value="discount">Giảm giá nhiều nhất</option>
                    <option value="rating">Đánh giá cao nhất</option>
                </select>
                <div class="cat-result-count" id="cat-result-count"></div>
            </div>

            <div class="product-grid" id="cat-grid"></div>
            <div id="cat-no-result" style="display:none" class="no-result">
                <div class="no-result-icon">📦</div>
                <p>Không có sản phẩm nào trong danh mục này</p>
                <a href="index.html">Về trang chủ</a>
            </div>
        </div>
    </main>

    <!-- Product info modal (reused from index.html) -->
    <div id="product-info-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span id="modal-close" class="modal-close">&times;</span>
            <div id="modal-product-info"></div>
        </div>
    </div>

    <footer><p>&copy; 2026 MNghi. Tất cả quyền được bảo lưu.</p></footer>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const catParam = params.get('cat') || '';

        // Set title & breadcrumb
        const titleEl = document.getElementById('cat-title');
        const crumbName = document.getElementById('cat-crumb-name');
        titleEl.textContent = catParam ? catParam : 'Tất cả sản phẩm';
        crumbName.textContent = catParam ? catParam : 'Tất cả sản phẩm';
        document.title = (catParam || 'Danh mục') + ' - MNghi';

        // Populate brand filter based on category
        const brandFilter = document.getElementById('filter-brand');
        const sortFilter = document.getElementById('filter-sort');
        const catGrid = document.getElementById('cat-grid');
        const noResult = document.getElementById('cat-no-result');
        const countEl = document.getElementById('cat-result-count');

        const catProducts = catParam ? products.filter(p => p.category === catParam) : products;
        const brands = [...new Set(catProducts.map(p => p.brand).filter(Boolean))].sort();
        brands.forEach(b => brandFilter.insertAdjacentHTML('beforeend', `<option value="${b}">${b}</option>`));

        function renderCatGrid() {
            const brand = brandFilter.value;
            const sort = sortFilter.value;
            let list = catParam ? products.filter(p => p.category === catParam) : products.slice();
            if (brand) list = list.filter(p => p.brand === brand);
            if (sort === 'price-asc') list.sort((a, b) => a.priceNumber - b.priceNumber);
            else if (sort === 'price-desc') list.sort((a, b) => b.priceNumber - a.priceNumber);
            else if (sort === 'discount') list.sort((a, b) => (b.discount || 0) - (a.discount || 0));
            else if (sort === 'rating') list.sort((a, b) => (b.rating || 0) - (a.rating || 0));

            countEl.textContent = `${list.length} sản phẩm`;

            if (!list.length) {
                catGrid.innerHTML = '';
                noResult.style.display = 'block';
                return;
            }
            noResult.style.display = 'none';

            const favs = JSON.parse(localStorage.getItem('favProducts')) || [];
            catGrid.innerHTML = list.map(p => {
                const salePrice = Math.floor(p.priceNumber * (1 - (p.discount || 0) / 100));
                const isFav = favs.includes(p.id);
                const stock = p.stock ?? 99;
                const stockBadge = stock === 0 ? '<span class="label label-outofstock">Hết hàng</span>'
                    : stock <= 5 ? `<span class="label label-lowstock">Còn ${stock}</span>` : '';
                return `
                    <div class="product" data-id="${p.id}">
                        <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${p.id}">♥</button>
                        <div class="label-row">
                            <span class="label label-discount">-${p.discount || 0}%</span>
                            ${p.freeShip ? '<span class="label label-freeship">FreeShip</span>' : ''}
                            <span class="label label-vote">${p.rating || 0} ★</span>
                            ${stockBadge}
                        </div>
                        <a class="product-link" href="product.html?id=${p.id}">
                            <img src="${p.image}" alt="${p.name}">
                            <h3>${p.name}</h3>
                        </a>
                        <p class="price-old">${p.price}</p>
                        <p class="price-new">${salePrice.toLocaleString()} VND</p>
                        <button class="add-to-cart" ${stock === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
                            ${stock === 0 ? 'Hết hàng' : 'Thêm vào giỏ'}
                        </button>
                    </div>`;
            }).join('');
        }

        brandFilter.addEventListener('change', renderCatGrid);
        sortFilter.addEventListener('change', renderCatGrid);

        // Add to cart + favorite + modal
        catGrid.addEventListener('click', e => {
            if (e.target.classList.contains('add-to-cart') && !e.target.disabled) {
                const card = e.target.closest('.product');
                const id = Number(card.dataset.id);
                const p = products.find(x => x.id === id);
                if (!p) return;
                let cartData = JSON.parse(localStorage.getItem('cart')) || [];
                const existing = cartData.find(i => i.id === id);
                if (existing) existing.quantity++;
                else cartData.push({ id: p.id, name: p.name, price: p.price, image: p.image, quantity: 1 });
                localStorage.setItem('cart', JSON.stringify(cartData));
                updateCartCount();
                showToast('Đã thêm vào giỏ hàng!', 'success');
            }
            if (e.target.classList.contains('favorite-btn')) {
                const id = Number(e.target.dataset.id);
                let favs = JSON.parse(localStorage.getItem('favProducts')) || [];
                if (favs.includes(id)) favs = favs.filter(f => f !== id);
                else favs.push(id);
                localStorage.setItem('favProducts', JSON.stringify(favs));
                e.target.classList.toggle('active');
            }
            const productLink = e.target.closest('.product-link');
            if (productLink) {
                if (e.ctrlKey || e.metaKey || e.shiftKey) return;
                e.preventDefault();
                const id = Number(new URL(productLink.href, window.location.origin).searchParams.get('id'));
                const p = products.find(x => x.id === id);
                if (p) showProductInfoModal(p);
            }
        });

        // Search bar với autocomplete
        const searchInput = document.getElementById('search-input');
        const autoComplete = document.getElementById('autocomplete');

        function showAC(text) {
            if (!text.trim()) { autoComplete.style.display = 'none'; autoComplete.innerHTML = ''; return; }
            const q = text.toLowerCase();
            const hits = products.filter(p =>
                p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q) || p.category.toLowerCase().includes(q)
            ).slice(0, 6);
            if (!hits.length) { autoComplete.style.display = 'none'; return; }
            autoComplete.innerHTML =
                `<div class="autocomplete-header">Gợi ý tìm kiếm</div>` +
                hits.map(p => {
                    const sale = Math.floor(p.priceNumber * (1 - (p.discount || 0) / 100));
                    return `<div class="autocomplete-item" data-name="${p.name}">
                        <img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">
                        <div class="autocomplete-item-info">
                            <div class="autocomplete-item-name">${p.name}</div>
                            <div class="autocomplete-item-price">${sale.toLocaleString()}₫</div>
                            <div class="autocomplete-item-cat">${p.category} · ${p.brand}</div>
                        </div>
                    </div>`;
                }).join('');
            autoComplete.style.display = 'block';
        }

        searchInput.addEventListener('input', e => showAC(e.target.value));
        autoComplete.addEventListener('click', e => {
            const item = e.target.closest('.autocomplete-item');
            if (!item) return;
            window.location.href = 'search.html?q=' + encodeURIComponent(item.dataset.name);
        });
        document.addEventListener('click', e => {
            if (!e.target.closest('.shopee-search')) autoComplete.style.display = 'none';
        });

        document.getElementById('search-btn').addEventListener('click', () => {
            const q = searchInput.value.trim();
            autoComplete.style.display = 'none';
            if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
        });
        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const q = e.target.value.trim();
                autoComplete.style.display = 'none';
                if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
            }
        });

        renderCatGrid();
    </script>
</body>
</html>
